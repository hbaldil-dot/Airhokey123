<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>Hava Hokeyi - Online</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; -webkit-user-select: none; user-select: none; }
  html, body {
    margin: 0; padding: 0;
    height: 100%; height: 100dvh;
    position: fixed; inset: 0;
    background: #0b0f19;
    font-family: 'Segoe UI', system-ui, sans-serif;
    color: #eef2ff;
    overflow: hidden;
    overscroll-behavior: none;
    touch-action: none;
  }
  #app { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; padding: 8px; }
  #topbar { display: flex; align-items: center; justify-content: space-between; width: 100%; max-width: 420px; margin-bottom: 8px; min-height: 34px; }
  #topbar-left { width: 76px; display: flex; gap: 6px; }
  #score { font-size: 24px; font-weight: 700; letter-spacing: 2px; flex: 1; text-align: center; }
  #topbar-right { width: 60px; display: flex; flex-direction: column; align-items: flex-end; gap: 2px; }
  .badge { font-size: 11px; padding: 3px 9px; border-radius: 999px; background: #1e293b; border: 1px solid #334155; white-space: nowrap; }
  #exitBtn, #soundBtn {
    width: 34px; height: 34px; border-radius: 50%; border: 1px solid #334155; background: #1e293b;
    font-size: 15px; line-height: 1; cursor: pointer; display: flex; align-items: center; justify-content: center;
  }
  #exitBtn { color: #f87171; visibility: hidden; }
  #exitBtn.show { visibility: visible; }
  #soundBtn { color: #eef2ff; }
  #canvas-wrap {
    position: relative; width: 100%; max-width: 420px; aspect-ratio: 4 / 6.5;
    border-radius: 16px; overflow: hidden; box-shadow: 0 0 0 2px #1e293b, 0 20px 50px rgba(0,0,0,0.5);
  }
  canvas { width: 100%; height: 100%; display: block; touch-action: none; }
  .overlay {
    position: absolute; inset: 0; display: flex; align-items: flex-start; justify-content: center;
    flex-direction: column; gap: 10px; background: rgba(5,8,15,0.96); text-align: center; padding: 20px 14px;
    overflow-y: auto; -webkit-overflow-scrolling: touch;
  }
  .overlay.hidden { display: none; }
  .overlay h2 { margin: 0; font-size: 18px; width: 100%; }
  .overlay p { margin: 0; color: #94a3b8; font-size: 12px; line-height: 1.4; width: 100%; }
  .section { width: 100%; max-width: 320px; margin: 0 auto 2px; }
  .section-title { font-size: 11px; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; text-align: left; }
  .row { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; }
  .optBtn { background: #1e293b; border: 1px solid #334155; color: white; padding: 7px 12px; border-radius: 999px; font-size: 12px; cursor: pointer; }
  .optBtn.active { background: #6366f1; border-color: #6366f1; }
  .colorRow {
    display: flex; align-items: center; justify-content: space-between; background: #131c2e; border: 1px solid #1e293b;
    border-radius: 12px; padding: 6px 12px; margin-bottom: 4px;
  }
  .colorRow span { font-size: 12px; }
  input[type="color"] { width: 36px; height: 26px; padding: 0; border: none; border-radius: 6px; background: transparent; cursor: pointer; }
  input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; border-radius: 6px; }
  input[type="color"]::-webkit-color-swatch { border: none; border-radius: 6px; }
  #startBtn, #playAgainBtn, #toMenuBtn {
    background: #6366f1; border: none; color: white; padding: 10px 24px; border-radius: 999px; font-size: 14px;
    cursor: pointer; font-weight: 600; margin: 6px auto 0; flex-shrink: 0; display: block;
  }
  #startBtn:disabled { opacity: 0.4; }
  #toMenuBtn { background: #1e293b; border: 1px solid #334155; }
  .statusDot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #f87171; margin-right: 6px; }
  .statusDot.on { background: #22c55e; }
  .statusRow { font-size: 12px; color: #94a3b8; display: flex; align-items: center; justify-content: center; gap: 8px; margin: 4px 0; }
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <div id="topbar-left">
      <button id="soundBtn">🔊</button>
      <button id="exitBtn">✕</button>
    </div>
    <div id="score"><span id="sMe">0</span> : <span id="sOpp">0</span></div>
    <div id="topbar-right">
      <div class="badge" id="roleBadge">-</div>
      <div class="badge" id="timerBadge">∞</div>
    </div>
  </div>

  <div id="canvas-wrap">
    <canvas id="game"></canvas>

    <div id="menuOverlay" class="overlay">
      <h2>🏒 Hava Hokeyi - Online</h2>
      <p id="connStatus">Sunucuya bağlanılıyor...</p>

      <div class="statusRow"><span class="statusDot" id="dotMe"></span> <span id="labelMe">Sen</span></div>
      <div class="statusRow"><span class="statusDot" id="dotOpp"></span> <span id="labelOpp">Rakip</span></div>

      <div class="section" id="hostSection" style="display:none;">
        <div class="section-title">Süre (Ev sahibi seçer)</div>
        <div class="row" id="durRow">
          <button class="optBtn" data-t="60">1 dk</button>
          <button class="optBtn" data-t="120">2 dk</button>
          <button class="optBtn" data-t="180">3 dk</button>
          <button class="optBtn active" data-t="0">Sınırsız</button>
        </div>
        <button id="startBtn" disabled>Rakip Bekleniyor...</button>
      </div>
      <div class="section" id="guestSection" style="display:none;">
        <p>Ev sahibinin oyunu başlatması bekleniyor...</p>
      </div>

      <div class="section">
        <div class="section-title">Vurucu Tipi (Senin)</div>
        <div class="row" id="paddleTypeRow">
          <button class="optBtn active" data-pt="circle">Daire</button>
          <button class="optBtn" data-pt="square">Kare</button>
          <button class="optBtn" data-pt="neon">Neon</button>
          <button class="optBtn" data-pt="triangle">Üçgen</button>
          <button class="optBtn" data-pt="viking">Viking</button>
        </div>
      </div>

      <div class="section">
        <div class="section-title">Renkler (sadece kendi ekranında)</div>
        <div class="colorRow"><span>Saha rengi</span><input type="color" id="rinkColorInput" value="#13233f"></div>
        <div class="colorRow"><span>Top rengi</span><input type="color" id="puckColorInput" value="#f8fafc"></div>
        <div class="colorRow"><span>Vurucu rengin</span><input type="color" id="paddleColorInput" value="#60a5fa"></div>
      </div>
    </div>

    <div id="resultOverlay" class="overlay hidden" style="align-items:center; justify-content:center;">
      <h2 id="resultTitle">Süre Bitti</h2>
      <p id="resultText"></p>
      <button id="toMenuBtn">Ana Menü</button>
    </div>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>

const sOppEl = document.getElementById('sOpp');

const settings = { paddleType: 'circle', rinkColor: '#13233f', puckColor: '#f8fafc', paddleColor: '#60a5fa' };

let myRole = null; // 'p1' | 'p2' | 'spectator'
let iAmConnected = false, oppConnected = false;
let selectedDuration = 0;
let latestState = {
  puck: { x: W/2, y: H/2 },
  paddles: { p1: { x: W/2, y: H-90 }, p2: { x: W/2, y: 90 } },
  score: { p1: 0, p2: 0 },
};

// ---- Ses motoru ----
let audioCtx = null, soundOn = true;
function ensureAudio() {
  if (!audioCtx) { const AC = window.AudioContext || window.webkitAudioContext; if (AC) audioCtx = new AC(); }
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
}
function beep({ freq=440, duration=0.08, type='sine', volume=0.2, freqEnd=null }) {
  if (!soundOn || !audioCtx) return;
  const t0 = audioCtx.currentTime;
  const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
  osc.type = type; osc.frequency.setValueAtTime(freq, t0);
  if (freqEnd) osc.frequency.exponentialRampToValueAtTime(freqEnd, t0 + duration);
  gain.gain.setValueAtTime(volume, t0);
  gain.gain.exponentialRampToValueAtTime(0.0001, t0 + duration);
  osc.connect(gain).connect(audioCtx.destination);
  osc.start(t0); osc.stop(t0 + duration);
}
function sndPaddleHit(speed) { beep({ freq: 220+Math.min(speed*8,220), duration:0.07, type:'triangle', volume:Math.min(0.3,0.12+speed*0.01) }); }
function sndWallHit() { beep({ freq:140, duration:0.05, type:'square', volume:0.1 }); }
function sndGoalFor() { beep({freq:523,duration:0.12,type:'sine',volume:0.25,freqEnd:784}); setTimeout(()=>beep({freq:784,duration:0.15,type:'sine',volume:0.25}),90); }
function sndGoalAgainst() { beep({freq:220,duration:0.25,type:'sawtooth',volume:0.2,freqEnd:110}); }
function sndGameEnd() { beep({freq:440,duration:0.15,type:'sine',volume:0.25}); setTimeout(()=>beep({freq:554,duration:0.15,type:'sine',volume:0.25}),140); setTimeout(()=>beep({freq:659,duration:0.25,type:'sine',volume:0.25}),280); }
soundBtn.addEventListener('click', () => { ensureAudio(); soundOn = !soundOn; soundBtn.textContent = soundOn ? '🔊' : '🔇'; });

function shade(hex, amt) {
  const num = parseInt(hex.slice(1), 16);
  let r=(num>>16)+amt, g=((num>>8)&0xff)+amt, b=(num&0xff)+amt;
  r=Math.min(255,Math.max(0,r)); g=Math.min(255,Math.max(0,g)); b=Math.min(255,Math.max(0,b));
  return '#' + (0x1000000 + r*0x10000 + g*0x100 + b).toString(16).slice(1);
}
function applyRinkColor() { canvas.style.background = `radial-gradient(circle at 50% 50%, ${shade(settings.rinkColor,26)}, ${shade(settings.rinkColor,-55)})`; }
applyRinkColor();

document.getElementById('rinkColorInput').addEventListener('input', e => { settings.rinkColor = e.target.value; applyRinkColor(); });
document.getElementById('puckColorInput').addEventListener('input', e => { settings.puckColor = e.target.value; });
document.getElementById('paddleColorInput').addEventListener('input', e => { settings.paddleColor = e.target.value; });
document.querySelectorAll('#paddleTypeRow .optBtn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#paddleTypeRow .optBtn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    settings.paddleType = btn.dataset.pt;
  });
});
document.querySelectorAll('#durRow .optBtn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#durRow .optBtn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedDuration = parseInt(btn.dataset.t, 10);
  });
});

// ---- Socket.io ----
const socket = io();

socket.on('connect', () => { connStatus.textContent = 'Bağlandı. Rol atanıyor...'; });
socket.on('disconnect', () => { connStatus.textContent = 'Bağlantı kesildi.'; });

socket.on('role', (role) => {
  myRole = role;
  if (role === 'p1') {
    roleBadge.textContent = 'Ev Sahibi';
    hostSection.style.display = 'block';
    guestSection.style.display = 'none';
    connStatus.textContent = 'Sen ev sahibisin. Rakip bağlanınca başlatabilirsin.';
  } else if (role === 'p2') {
    roleBadge.textContent = 'Misafir';
    hostSection.style.display = 'none';
    guestSection.style.display = 'block';
    connStatus.textContent = 'Bağlandın. Ev sahibi başlatacak.';
  } else {
    roleBadge.textContent = 'İzleyici';
    connStatus.textContent = 'Masa dolu, izleyici olarak bağlandın.';
  }
});

socket.on('playersStatus', (status) => {
  iAmConnected = myRole === 'p1' ? status.p1 : status.p2;
  oppConnected = myRole === 'p1' ? status.p2 : status.p1;
  dotMe.classList.toggle('on', iAmConnected);
  dotOpp.classList.toggle('on', oppConnected);
  labelOpp.textContent = oppConnected ? 'Rakip bağlı' : 'Rakip bekleniyor...';
  if (myRole === 'p1') {
    startBtn.disabled = !oppConnected;
    startBtn.textContent = oppConnected ? 'Oyuna Başla' : 'Rakip Bekleniyor...';
  }
});

startBtn.addEventListener('click', () => {
  ensureAudio();
  socket.emit('startGame', { duration: selectedDuration });
});

socket.on('gameStarted', ({ duration }) => {
  ensureAudio();
  menuOverlay.classList.add('hidden');
  resultOverlay.classList.add('hidden');
  exitBtn.classList.add('show');
  sMeEl.textContent = 0; sOppEl.textContent = 0;
  timerBadge.textContent = duration > 0 ? formatTime(duration) : '∞';
});

socket.on('timer', (t) => { timerBadge.textContent = formatTime(Math.max(0, t)); });

socket.on('state', (state) => {
  latestState = state;
  const myScore = myRole === 'p2' ? state.score.p2 : state.score.p1;
  const oppScore = myRole === 'p2' ? state.score.p1 : state.score.p2;
  sMeEl.textContent = myScore;
  sOppEl.textContent = oppScore;
});

socket.on('goal', ({ who }) => {
  if (who === myRole) sndGoalFor(); else sndGoalAgainst();
});

socket.on('sfx', ({ type, speed }) => {
  if (type === 'paddle') sndPaddleHit(speed || 8);
  else sndWallHit();
});

socket.on('gameOver', ({ score }) => {
  sndGameEnd();
  exitBtn.classList.remove('show');
  const myScore = myRole === 'p2' ? score.p2 : score.p1;
  const oppScore = myRole === 'p2' ? score.p1 : score.p2;
  if (myScore > oppScore) resultTitle.textContent = '🎉 Kazandın!';
  else if (oppScore > myScore) resultTitle.textContent = 'Kaybettin';
  else resultTitle.textContent = 'Berabere';
  resultText.textContent = `Skor: ${myScore} - ${oppScore}`;
  resultOverlay.classList.remove('hidden');
});

socket.on('opponentLeft', (whoLeft) => {
  exitBtn.classList.remove('show');
  resultOverlay.classList.add('hidden');
  menuOverlay.classList.remove('hidden');
  if (whoLeft !== myRole) connStatus.textContent = 'Rakip ayrıldı. Yeniden başlatabilirsin.';
});

exitBtn.addEventListener('click', () => {
  socket.emit('exitGame');
  exitBtn.classList.remove('show');
  resultOverlay.classList.add('hidden');
  menuOverlay.classList.remove('hidden');
});
document.getElementById('toMenuBtn').addEventListener('click', () => {
  resultOverlay.classList.add('hidden');
  menuOverlay.classList.remove('hidden');
});

function formatTime(sec) { const m = Math.floor(sec/60), s = sec%60; return `${m}:${s.toString().padStart(2,'0')}`; }

// ---- Kontrol: parmak / fare, sadece kendi yarım sahan ----
function setMyPos(clientX, clientY) {
  if (myRole !== 'p1' && myRole !== 'p2') return;
  const rect = canvas.getBoundingClientRect();
  const scaleX = W / rect.width, scaleY = H / rect.height;
  const x = (clientX - rect.left) * scaleX;
  const y = (clientY - rect.top) * scaleY;
  const cx = Math.max(PADDLE_R, Math.min(W - PADDLE_R, x));
  const cy = myRole === 'p1'
    ? Math.max(H/2 + PADDLE_R, Math.min(H - PADDLE_R, y))
    : Math.max(PADDLE_R, Math.min(H/2 - PADDLE_R, y));
  socket.emit('paddleMove', { x: cx, y: cy });
}
canvas.addEventListener('mousemove', (e) => setMyPos(e.clientX, e.clientY));
canvas.addEventListener('touchstart', (e) => { e.preventDefault(); const t=e.touches[0]; if(t) setMyPos(t.clientX,t.clientY); }, { passive:false });
canvas.addEventListener('touchmove', (e) => { e.preventDefault(); const t=e.touches[0]; if(t) setMyPos(t.clientX,t.clientY); }, { passive:false });
document.addEventListener('touchmove', (e) => { e.preventDefault(); }, { passive:false });
document.addEventListener('gesturestart', (e) => { e.preventDefault(); });

// ---- Çizim (tamamen sunucudan gelen veriyle) ----
function draw() {
  ctx.clearRect(0, 0, W, H);
  ctx.strokeStyle = 'rgba(255,255,255,0.12)'; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(0, H/2); ctx.lineTo(W, H/2); ctx.stroke();
  ctx.beginPath(); ctx.arc(W/2, H/2, 50, 0, Math.PI*2); ctx.stroke();

  const goalL = W/2 - GOAL_W/2, goalR = W/2 + GOAL_W/2;
  const C = CHAMFER;
  const goalColor = '#22d3ee';
  for (const y of [0, H]) {
    const dir = y === 0 ? 1 : -1;
    const grad = ctx.createLinearGradient(0, y, 0, y + dir*60);
    grad.addColorStop(0, 'rgba(34,211,238,0.55)'); grad.addColorStop(1, 'rgba(34,211,238,0)');
    ctx.fillStyle = grad; ctx.fillRect(goalL, Math.min(y, y+dir*60), GOAL_W, 60);
    ctx.strokeStyle = goalColor; ctx.lineWidth = 4; ctx.shadowColor = goalColor; ctx.shadowBlur = 10;
    ctx.beginPath(); ctx.moveTo(goalL,y); ctx.lineTo(goalR,y); ctx.stroke(); ctx.shadowBlur = 0;
    ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 5;
    ctx.beginPath(); ctx.moveTo(goalL,y); ctx.lineTo(goalL,y+dir*16); ctx.moveTo(goalR,y); ctx.lineTo(goalR,y+dir*16); ctx.stroke();
  }

  ctx.beginPath();
  ctx.moveTo(C,0); ctx.lineTo(goalL,0); ctx.moveTo(goalR,0); ctx.lineTo(W-C,0); ctx.lineTo(W,C); ctx.lineTo(W,H-C);
  ctx.lineTo(W-C,H); ctx.lineTo(goalR,H); ctx.moveTo(goalL,H); ctx.lineTo(C,H); ctx.lineTo(0,H-C); ctx.lineTo(0,C); ctx.lineTo(C,0);
  ctx.strokeStyle = '#f8fafc'; ctx.lineWidth = 5; ctx.shadowColor = 'rgba(248,250,252,0.6)'; ctx.shadowBlur = 6; ctx.stroke(); ctx.shadowBlur = 0;

  const myP = myRole === 'p2' ? latestState.paddles.p2 : latestState.paddles.p1;
  const oppP = myRole === 'p2' ? latestState.paddles.p1 : latestState.paddles.p2;

  drawPaddle(oppP.x, oppP.y, '#f87171', 'circle');
  drawPaddle(myP.x, myP.y, settings.paddleColor, settings.paddleType);

  const puck = latestState.puck;
  ctx.beginPath(); ctx.arc(puck.x, puck.y, PUCK_R, 0, Math.PI*2);
  ctx.fillStyle = settings.puckColor; ctx.shadowColor = settings.puckColor; ctx.shadowBlur = 12;
  ctx.fill(); ctx.shadowBlur = 0;
}

function drawPaddle(x, y, color, type) {
  ctx.save();
  if (type === 'circle') {
    ctx.beginPath(); ctx.arc(x,y,PADDLE_R,0,Math.PI*2);
    ctx.fillStyle = color; ctx.shadowColor = color; ctx.shadowBlur = 14; ctx.fill(); ctx.shadowBlur = 0;
    ctx.beginPath(); ctx.arc(x,y,9,0,Math.PI*2); ctx.fillStyle = '#0b0f19'; ctx.fill();
  } else if (type === 'square') {
    ctx.fillStyle = color; ctx.shadowColor = color; ctx.shadowBlur = 14;
    ctx.fillRect(x-PADDLE_R, y-PADDLE_R, PADDLE_R*2, PADDLE_R*2); ctx.shadowBlur = 0;
    ctx.fillStyle = '#0b0f19'; ctx.fillRect(x-6, y-6, 12, 12);
  } else if (type === 'neon') {
    ctx.strokeStyle = color; ctx.lineWidth = 4; ctx.shadowColor = color; ctx.shadowBlur = 14;
    ctx.beginPath(); ctx.arc(x,y,PADDLE_R,0,Math.PI*2); ctx.stroke();
    ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(x-8,y); ctx.lineTo(x+8,y); ctx.moveTo(x,y-8); ctx.lineTo(x,y+8); ctx.stroke();
  } else if (type === 'triangle') {
    ctx.fillStyle = color; ctx.shadowColor = color; ctx.shadowBlur = 14;
    ctx.beginPath(); ctx.moveTo(x,y-PADDLE_R); ctx.lineTo(x-PADDLE_R,y+PADDLE_R); ctx.lineTo(x+PADDLE_R,y+PADDLE_R); ctx.closePath(); ctx.fill();
  } else if (type === 'viking') {
    ctx.beginPath(); ctx.arc(x,y,PADDLE_R,0,Math.PI*2); ctx.save(); ctx.clip();
    if (vikingImg.complete && vikingImg.naturalWidth > 0) {
      ctx.drawImage(vikingImg, x-PADDLE_R, y-PADDLE_R, PADDLE_R*2, PADDLE_R*2);
    } else { ctx.fillStyle = color; ctx.fill(); }
    ctx.restore();
    ctx.lineWidth = 3; ctx.strokeStyle = color; ctx.shadowColor = color; ctx.shadowBlur = 12;
    ctx.beginPath(); ctx.arc(x,y,PADDLE_R,0,Math.PI*2); ctx.stroke(); ctx.shadowBlur = 0;
  }
  ctx.restore();
}

function loop() { draw(); requestAnimationFrame(loop); }
loop();
</script>
